name: check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Run local checks
        run: scripts/check.sh

      - name: Audit Python production dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Audit frontend production dependencies
        run: npm audit --omit=dev

      - name: Block high-severity Python SAST findings
        run: python -m bandit -q -lll -r app core scripts server.py
