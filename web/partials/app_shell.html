    <!-- App menu -->
    <div class="app-menu" id="app-menu">
        <button type="button" class="app-menu-button" id="app-menu-toggle"
            data-i18n-attr="title:appMenu.open;aria-label:appMenu.open" title="Otwórz menu"
            aria-label="Otwórz menu" aria-controls="app-menu-drawer" aria-expanded="false"
            onclick="toggleAppMenu()">
            <svg class="app-menu-icon app-menu-icon--open" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z" />
            </svg>
            <svg class="app-menu-icon app-menu-icon--close" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z" />
            </svg>
        </button>
    </div>
    <button class="app-menu-scrim" id="app-menu-scrim" type="button" hidden
        data-i18n-attr="aria-label:appMenu.close" aria-label="Zamknij menu" onclick="closeAppMenu()"></button>
    <aside class="app-menu-drawer" id="app-menu-drawer" hidden aria-label="Menu aplikacji">
        <div class="app-menu-drawer-header">
            <div class="app-menu-title-wrap">
                <button type="button" class="app-menu-brand" id="app-menu-title" onclick="closeAppMenu()">WreckScanner</button>
            </div>
        </div>

        <section class="app-menu-map-panel" aria-label="Kontrolki mapy">
            <button type="button" class="panel-photo-cta" id="panel-add-field-photo"
                data-i18n-attr="title:panel.addPhotoTitle" title="Wskaż miejsce zdjęcia na mapie"
                aria-pressed="false" onclick="openFieldPhotoUploadFromPanel()" hidden>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                        d="M5 7h2.8L9.4 5h5.2l1.6 2H19c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V9c0-1.1.9-2 2-2zm7 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0-2a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" />
                </svg>
                <span data-panel-add-photo-label data-i18n="panel.addPhoto">Dodaj zdjęcie</span>
            </button>

            <section class="panel-section panel-map-source" id="panel-map-source"
                data-i18n-attr="aria-label:panel.baseMap" aria-label="Podkład mapy">
                <div class="panel-section-heading">
                    <span data-i18n="panel.baseMap">Podkład mapy</span>
                    <label class="map-source-slider-toggle"
                        data-i18n-attr="title:panel.baseMapSliderToggle"
                        title="Pokaż dolny suwak">
                        <input type="checkbox" id="map-source-slider-toggle"
                            data-i18n-attr="aria-label:panel.baseMapSliderToggle"
                            aria-label="Pokaż dolny suwak" onchange="setMapSourceSliderVisible(this.checked)" checked>
                        <span class="map-source-slider-toggle-mark" aria-hidden="true"></span>
                    </label>
                </div>
                <div class="map-source-menu-options" id="map-source-menu-options"
                    data-i18n-attr="aria-label:panel.baseMap" aria-label="Podkład mapy" role="group"></div>
            </section>

            <section class="panel-section panel-layers">
                <div id="map-layer-controls" class="map-layer-controls is-loading-public-layers" aria-label="Warstwy mapy">
                    <div class="layer-toggle layer-toggle--vehicle">
                        <label class="layer-toggle-row">
                            <input type="checkbox" id="toggle-vehicles" checked
                                onchange="toggleVehicleLayer(this.checked)">
                            <span class="layer-pin layer-pin--vehicle"></span>
                            <span class="layer-label" data-i18n="layers.vehicles">Pojazdy</span>
                            <span class="layer-count-badge" id="layer-count-vehicles">0</span>
                        </label>
                        <div class="vehicle-filter-tray" data-i18n-attr="aria-label:layers.vehicleFilters"
                            aria-label="Filtry pojazdów" role="group">
                            <button type="button" class="vehicle-cycle-filter" id="vehicle-insurance-cycle-filter"
                                aria-pressed="false" onclick="cycleVehicleInsuranceFilter()">
                                <span class="vehicle-filter-off-dot" data-vehicle-insurance-filter-dot
                                    aria-hidden="true"></span>
                                <span class="vehicle-cycle-filter-label" data-vehicle-insurance-filter-label>OC: wył.</span>
                                <span class="vehicle-filter-count is-empty" id="vehicle-insurance-filter-count"
                                    aria-hidden="true"></span>
                            </button>
                            <button type="button" class="vehicle-cycle-filter" id="vehicle-standing-cycle-filter"
                                aria-pressed="false" onclick="cycleVehicleStandingFilterDays()">
                                <span class="vehicle-filter-off-dot" data-vehicle-standing-filter-dot
                                    aria-hidden="true"></span>
                                <span class="vehicle-cycle-filter-label" data-vehicle-standing-filter-label>Postój: wył.</span>
                                <span class="vehicle-filter-count is-empty" id="vehicle-standing-filter-count"
                                    aria-hidden="true"></span>
                            </button>
                        </div>
                    </div>
                    <label class="layer-toggle">
                        <input type="checkbox" id="toggle-field-photo-infrastructure" checked
                            onchange="toggleFieldPhotoIssueFilter('infrastructure', this.checked)">
                        <span class="layer-pin layer-pin--field-photo-infrastructure"></span>
                        <span class="layer-label" data-i18n="layers.fieldPhotoInfrastructure">Niebezpieczna infrastruktura</span>
                        <span class="layer-count-badge" id="layer-count-field-photo-infrastructure">0</span>
                    </label>
                    <label class="layer-toggle">
                        <input type="checkbox" id="toggle-field-photo-smoke" checked
                            onchange="toggleFieldPhotoIssueFilter('smoke', this.checked)">
                        <span class="layer-pin layer-pin--field-photo-smoke"></span>
                        <span class="layer-label" data-i18n="layers.fieldPhotoSmoke">Zanieczyszczone powietrze</span>
                        <span class="layer-count-badge" id="layer-count-field-photo-smoke">0</span>
                    </label>
                    <label class="layer-toggle">
                        <input type="checkbox" id="toggle-field-photo-pending" checked
                            onchange="togglePendingFieldPhotoLayer(this.checked)">
                        <span class="layer-pin layer-pin--field-photo-pending"></span>
                        <span class="layer-label" data-i18n="layers.fieldPhotoPending">Do weryfikacji</span>
                        <span class="layer-count-badge" id="layer-count-field-photo-pending">0</span>
                    </label>
                    <label class="layer-toggle" data-i18n-attr="title:layers.cadastralTooltip">
                        <input type="checkbox" id="toggle-cadastral-parcels"
                            onchange="toggleCadastralLayer(this.checked)">
                        <span class="layer-pin layer-pin--cadastral"></span>
                        <span class="layer-label" data-i18n="layers.cadastral">Granice działek</span>
                    </label>
                </div>
            </section>

            <div id="status"></div>
        </section>

        <nav class="app-menu-drawer-section" aria-label="Menu aplikacji">
            <button type="button" class="app-menu-drawer-item" onclick="openModal('modal-help'); closeAppMenu()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-6h2v6zm0-8h-2V7h2v2z" />
                </svg>
                <span data-i18n="icon.help">Jak korzystać</span>
            </button>
            <button type="button" class="app-menu-drawer-item" onclick="openSettingsModal(); closeAppMenu()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19.14 12.94c.04-.31.06-.62.06-.94 0-.32-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96a7.026 7.026 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.484.484 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.07.49.12.61l2.03 1.58c-.04.31-.07.62-.07.94 0 .32.02.63.06.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.25.41.48.41h3.84c.24 0 .43-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                </svg>
                <span data-i18n="icon.settings">Ustawienia</span>
            </button>
            <button type="button" class="app-menu-drawer-item"
                onclick="openModal('modal-privacy-info'); closeAppMenu()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3zm0 2.2 6 2.25V11c0 3.9-2.45 7.65-6 8.85C8.45 18.65 6 14.9 6 11V6.45l6-2.25z" />
                </svg>
                <span data-i18n="footer.privacy">Prywatność</span>
            </button>
            <button type="button" class="app-menu-drawer-item" onclick="openProblemReportModal(); closeAppMenu()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 4h16v16H4V4zm2 2v12h12V6H6zm2 2h8v2H8V8zm0 4h8v2H8v-2zm0 4h5v2H8v-2z" />
                </svg>
                <span data-i18n="footer.report">Zgłoś problem</span>
            </button>
        </nav>
        <div class="app-menu-drawer-footer">
            <button type="button" class="app-menu-footer-icon app-menu-footer-icon--lang btn-lang" id="app-menu-toggle-lang"
                data-i18n-attr="title:icon.lang;aria-label:icon.lang"
                title="Język / Language" aria-label="Język / Language" onclick="toggleLang()">
                <span class="lang-label" id="app-menu-lang-label">PL</span>
            </button>
            <button type="button" class="app-menu-footer-icon app-menu-footer-icon--admin" id="open-admin-panel"
                data-i18n-attr="title:icon.adminPanel;aria-label:icon.adminPanel"
                title="Panel administratora" aria-label="Panel administratora"
                onclick="openAdminPanel(); closeAppMenu()">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M17 9V7A5 5 0 0 0 7 7v2H5v12h14V9h-2zm-8 0V7a3 3 0 0 1 6 0v2H9zm5 8h-2v-4h2v4z" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- Interactive Map -->
    <div id="map"></div>
    <div id="map-field-photo-pick-hint" class="map-pick-hint" role="status" aria-live="polite" hidden>
        <span class="map-pick-hint-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <path d="M12 2 5 5v6c0 4.7 3 8.8 7 10 4-1.2 7-5.3 7-10V5l-7-3zm0 3.1 4 1.5V11c0 3-1.6 5.8-4 7-2.4-1.2-4-4-4-7V6.6l4-1.5zm0 3.4a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" />
            </svg>
        </span>
        <span data-map-pick-hint-label data-i18n="panel.addPhotoPickStatus">Kliknij miejsce na mapie, w którym chcesz dodać zdjęcie.</span>
        <button type="button" class="map-pick-hint-close"
            data-i18n-attr="title:panel.addPhotoPickCancel;aria-label:panel.addPhotoPickCancel"
            title="Anuluj wybór miejsca" aria-label="Anuluj wybór miejsca"
            onclick="cancelFieldPhotoLocationPick({ clearStatus: true })">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4-6.3-6.3-6.3 6.3-1.4-1.4L9.2 12 2.9 5.7l1.4-1.4 6.3 6.3 6.3-6.3 1.4 1.4z" />
            </svg>
        </button>
    </div>

    <!-- Map source slider -->
    <div id="year-slider">
        <button type="button" class="year-arrow" id="year-prev" title="◀">◀</button>
        <div class="year-track">
            <input type="range" id="year-range" min="0" max="7" step="1" value="7">
            <div class="year-ticks" id="year-ticks"></div>
        </div>
        <button type="button" class="year-arrow" id="year-next" title="▶">▶</button>
        <div class="year-current" id="year-current">POL</div>
    </div>

    <!-- Map right-click menu -->
    <div id="map-context-menu" class="map-context-menu" role="menu" aria-label="Menu punktu mapy" hidden>
        <div class="context-menu-coords" id="context-menu-coords"></div>
        <button type="button" id="context-add-field-photos" role="menuitem"
            onclick="openFieldPhotoUploadAtContextPoint()" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M5 7h2.8L9.4 5h5.2l1.6 2H19c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V9c0-1.1.9-2 2-2zm7 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm5-5h-2v2h-2v2h2v2h2v-2h2v-2h-2v-2z" />
            </svg>
            <span data-i18n="context.addFieldPhotos">Dodaj zdjęcia tutaj</span>
        </button>
        <button type="button" id="context-inspect-location" role="menuitem" onclick="openLocationInspectionAtContextPoint()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M4 5h16v2H4V5zm1 4h4v10H5V9zm5 0h4v10h-4V9zm5 0h4v10h-4V9zM3 20h18v2H3v-2z" />
            </svg>
            <span data-i18n="context.inspectLocation">Pokaż historię miejsca</span>
        </button>
        <button type="button" id="context-identify-parcel" role="menuitem"
            onclick="identifyCadastralParcelAtContextPoint()" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M4 4h16v16H4V4zm2 2v5h5V6H6zm7 0v5h5V6h-5zM6 13v5h5v-5H6zm7 0v5h5v-5h-5z" />
            </svg>
            <span data-i18n="context.identifyParcel">Sprawdź działkę</span>
        </button>
        <button type="button" role="menuitem" onclick="openMapSourcePanelFromContext()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M4 6.5 12 3l8 3.5-8 3.5-8-3.5zm0 4L12 14l8-3.5V13l-8 3.5L4 13v-2.5zm0 5L12 19l8-3.5V18l-8 3.5L4 18v-2.5z" />
            </svg>
            <span data-i18n="context.changeBaseMap">Zmień podkład mapy</span>
        </button>
        <button type="button" class="map-context-secondary" role="menuitem" onclick="copyContextPlaceLink()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M3.9 12a5 5 0 0 1 5-5h4v2h-4a3 3 0 0 0 0 6h4v2h-4a5 5 0 0 1-5-5zm5.1 1h6v-2H9v2zm2-6h4a5 5 0 0 1 0 10h-4v-2h4a3 3 0 0 0 0-6h-4V7z" />
            </svg>
            <span data-i18n="context.copyPlaceLink">Skopiuj link do miejsca</span>
        </button>
        <button type="button" role="menuitem" onclick="copyContextCoords()">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M16 1H4c-1.1 0-2 .9-2 2v12h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
            </svg>
            <span data-i18n="context.copyCoords">Kopiuj współrzędne</span>
        </button>
    </div>
